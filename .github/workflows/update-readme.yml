name: Atualizar README com notícias tech

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências
        run: |
          cd scripts
          npm install

      - name: Gerar README com notícias
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          cd scripts
          node readme.js

      - name: Commit e push do README atualizado
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "README Bot 📰"
          git add README.md
          # Só faz commit se houver mudanças
          git diff --staged --quiet || git commit -m "📰 Notícias tech do dia $(date '+%d/%m/%Y')"
          git push